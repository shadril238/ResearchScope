name: Backfill Historical Papers

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Start date (YYYY-MM-DD) — e.g. 2026-01-01'
        required: true
        default: '2026-01-01'
      skip_conferences:
        description: 'Skip conference connectors (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: backfill-main
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill pipeline
        run: |
          SKIP_FLAG=""
          if [ "${{ github.event.inputs.skip_conferences }}" = "true" ]; then
            SKIP_FLAG="--skip-conferences"
          fi
          python src/pipeline.py --backfill-from ${{ github.event.inputs.from_date }} $SKIP_FLAG
        env:
          PYTHONPATH: ${{ github.workspace }}
          SEMANTIC_SCHOLAR_KEY: ${{ secrets.SEMANTIC_SCHOLAR_KEY }}

      - name: Commit backfilled data
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add site/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: backfill data from ${{ github.event.inputs.from_date }}"

          # Rebase on latest main in case another job pushed while pipeline ran
          git fetch origin main
          git rebase origin/main

          # Push with one retry for any remaining race
          git push origin HEAD:main || (sleep 5 && git fetch origin main && git rebase origin/main && git push origin HEAD:main)

  deploy:
    needs: backfill
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
