<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Authors – ResearchScope</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
<nav class="rs-nav">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-14">
      <a href="index.html" class="font-bold text-lg" style="color:var(--rs-primary)">🔭 ResearchScope</a>
      <div class="hidden sm:flex items-center gap-5 text-sm font-medium">
        <a href="index.html">Home</a><a href="papers.html">Papers</a><a href="topics.html">Topics</a>
        <a href="conferences.html">Conferences</a><a href="authors.html" class="active">Authors</a>
        <a href="labs.html">Labs &amp; Unis</a><a href="gaps.html">Research Gaps</a><a href="deadlines.html">📅 Upcoming Conferences</a>
      </div>
      <button id="theme-toggle"><span id="theme-icon">🌙</span></button>
    </div>
  </div>
</nav>
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <h1 class="text-2xl font-bold mb-2">👩‍🔬 Authors</h1>
  <p class="text-sm mb-6" style="color:var(--rs-muted)">Researchers ranked by paper count and momentum score.</p>

  <div class="rs-card p-4 mb-6">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
      <input id="search-authors" class="rs-input sm:col-span-2" type="text" placeholder="Search author name…"/>
      <select id="sort-authors" class="rs-select">
        <option value="papers">Sort: Paper Count</option>
        <option value="momentum">Sort: Momentum</option>
        <option value="name">Sort: Name A–Z</option>
        <option value="avg_score">Sort: Avg Score</option>
      </select>
    </div>
  </div>

  <p id="author-count" class="text-xs mb-4" style="color:var(--rs-muted)"></p>
  <div id="authors-grid"><div class="spinner"></div></div>
  <div id="paginator"></div>
</div>
<footer class="border-t py-6 text-center text-sm mt-8" style="border-color:var(--rs-border);color:var(--rs-muted)">ResearchScope — open-source research intelligence</footer>
<script src="assets/js/app.js"></script>
<script>
let allAuthors = [];
let filtered = [];
let currentPage = 1;
const PAGE_SIZE = 24;

function renderAuthorCard(a) {
  const initials = (a.name||'?').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
  const momentum = +a.momentum_score || 0;
  const bd = a.momentum_breakdown || {};
  return `
  <div class="rs-card p-4 flex flex-col gap-3">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-full flex items-center justify-center text-lg font-bold flex-shrink-0"
           style="background:var(--rs-primary);color:#fff">${escHtml(initials)}</div>
      <div class="min-w-0">
        <div class="font-semibold truncate">${escHtml(a.name)}</div>
        <div class="text-xs" style="color:var(--rs-muted)">${(a.paper_ids||[]).length} papers · ${(a.recent_paper_ids||[]).length} recent</div>
        ${(a.affiliations||[]).length ? `<div class="text-xs truncate" style="color:var(--rs-muted)">${escHtml(a.affiliations[0])}</div>` : ''}
      </div>
    </div>
    <div>
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs" style="color:var(--rs-muted)">Momentum</span>
        <span class="text-sm font-bold">${momentum.toFixed(1)}/10</span>
      </div>
      <div class="momentum-bar"><div class="momentum-fill" style="width:${momentum*10}%"></div></div>
    </div>
    ${(a.topics||a.top_topics||[]).length ? `
    <div class="flex flex-wrap gap-1">
      ${(a.topics||a.top_topics).slice(0,4).map(t=>`<span class="badge badge-tag">${escHtml(t)}</span>`).join('')}
    </div>` : ''}
    ${a.avg_paper_score > 0 ? `
    <div class="text-xs" style="color:var(--rs-muted)">Avg paper score: <strong>${(+a.avg_paper_score||0).toFixed(1)}</strong></div>` : ''}
    ${a.summary_profile ? `<p class="text-xs italic" style="color:var(--rs-muted)">${escHtml(truncate(a.summary_profile,140))}</p>` : ''}
  </div>`;
}

function renderGrid() {
  const start = (currentPage-1)*PAGE_SIZE;
  const page  = filtered.slice(start, start+PAGE_SIZE);
  document.getElementById('author-count').textContent =
    `${filtered.length} author${filtered.length!==1?'s':''} · page ${currentPage} of ${Math.max(1,Math.ceil(filtered.length/PAGE_SIZE))}`;

  if (!page.length) {
    document.getElementById('authors-grid').innerHTML = '<div class="empty-state"><p>No authors match.</p></div>';
    return;
  }
  document.getElementById('authors-grid').innerHTML =
    `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">` +
    page.map(renderAuthorCard).join('') + `</div>`;
  renderPaginator('paginator', currentPage, Math.ceil(filtered.length/PAGE_SIZE),
    `function(p){currentPage=p;renderGrid();}`);
}

function applyFilters() {
  const q    = document.getElementById('search-authors').value.toLowerCase();
  const sort = document.getElementById('sort-authors').value;
  filtered = allAuthors.filter(a => !q || (a.name||'').toLowerCase().includes(q));
  filtered.sort((a,b) => {
    if (sort==='papers')    return (b.paper_ids||[]).length - (a.paper_ids||[]).length;
    if (sort==='momentum')  return (b.momentum_score||0) - (a.momentum_score||0);
    if (sort==='name')      return (a.name||'').localeCompare(b.name||'');
    if (sort==='avg_score') return (b.avg_paper_score||0) - (a.avg_paper_score||0);
    return 0;
  });
  currentPage = 1;
  renderGrid();
}

(async () => {
  const authors = await fetchData('data/authors.json');
  if (!authors || !authors.length) { showEmpty('authors-grid','No authors yet. Run the pipeline.'); return; }
  allAuthors = authors;
  ['search-authors','sort-authors'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', debounce(applyFilters, 200));
  });
  applyFilters();
})();
</script>
</body>
</html>
